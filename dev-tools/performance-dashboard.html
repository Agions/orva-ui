<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nano-UI 性能仪表板</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            margin: 0;
            font-size: 2.5em;
            background: linear-gradient(45deg, #a855f7, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .metric-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .metric-value {
            font-size: 2em;
            font-weight: bold;
            color: #a855f7;
            margin: 10px 0;
        }
        
        .metric-label {
            font-size: 0.9em;
            opacity: 0.8;
        }
        
        .chart-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .chart-title {
            margin-top: 0;
            color: #f97316;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-style: italic;
            opacity: 0.7;
        }
        
        @media (max-width: 768px) {
            .metrics-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>🎯 Nano-UI 性能仪表板</h1>
            <p>实时监控组件性能和用户体验</p>
        </div>
        
        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-value" id="componentCount">--</div>
                <div class="metric-label">活跃组件</div>
            </div>
            
            <div class="metric-card">
                <div class="metric-value" id="avgRenderTime">--</div>
                <div class="metric-label">平均渲染时间 (ms)</div>
            </div>
            
            <div class="metric-card">
                <div class="metric-value" id="memoryUsage">--</div>
                <div class="metric-label">内存使用 (MB)</div>
            </div>
            
            <div class="metric-card">
                <div class="metric-value" id="errorRate">--</div>
                <div class="metric-label">错误率 (%)</div>
            </div>
        </div>
        
        <div class="chart-section">
            <h3 class="chart-title">📈 实时性能趋势</h3>
            <div class="loading">加载中...</div>
        </div>
        
        <div class="chart-section">
            <h3 class="chart-title">🚨 最近错误</h3>
            <div class="loading">等待数据...</div>
        </div>
    </div>

    <script>
        class PerformanceDashboard {
            constructor() {
                this.updateInterval = null;
                this.init();
            }
            
            init() {
                this.startPeriodicUpdate();
                this.setupEventListeners();
            }
            
            startPeriodicUpdate() {
                this.updateInterval = setInterval(() => {
                    this.updateMetrics();
                }, 2000);
            }
            
            updateMetrics() {
                // 模拟性能指标更新
                const componentCount = Math.floor(Math.random() * 20) + 5;
                const avgRenderTime = Math.floor(Math.random() * 100) + 50;
                const memoryUsage = Math.floor(Math.random() * 50) + 20;
                const errorRate = Math.floor(Math.random() * 5);
                
                document.getElementById('componentCount').textContent = componentCount;
                document.getElementById('avgRenderTime').textContent = avgRenderTime;
                document.getElementById('memoryUsage').textContent = memoryUsage;
                document.getElementById('errorRate').textContent = errorRate;
                
                // 这里可以集成真实的性能API
                console.log('[Performance Dashboard] 指标更新:', {
                    componentCount,
                    avgRenderTime,
                    memoryUsage,
                    errorRate
                });
            }
            
            setupEventListeners() {
                // 添加键盘快捷键
                document.addEventListener('keydown', (e) => {
                    if (e.ctrlKey && e.key === 'd') {
                        this.toggleDebugMode();
                    }
                });
            }
            
            toggleDebugMode() {
                console.log('[Performance Dashboard] 切换到调试模式');
                // 实现调试模式切换
            }
        }
        
        // 初始化仪表板
        window.addEventListener('load', () => {
            new PerformanceDashboard();
        });
        
        // 导出到全局，便于调试
        window.PerformanceDashboard = PerformanceDashboard;
    </script>
</body>
</html>
